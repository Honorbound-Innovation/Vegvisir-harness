id: skill-analysis-hypothesis-evidence-control
title: analysis.hypothesis_evidence_control
summary: Manage competing hypotheses and keep hints distinct from verified evidence
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: artifact-analysis
source_section_ids:
- skill-analysis-hypothesis-evidence-control
procedure:
- Restate the concrete question being solved and the authorized scope.
- Separate user authority, user hints, artifact observations, tool output, external references, and analyst inference.
- Maintain a hypothesis ledger with source, support, contradiction, verification method, and status.
- Identify layer-specific evidence checkpoints such as hashes, counts, stream lengths, parser roundtrips, magic bytes, or runtime output.
- Test the cheapest decisive checks first and preserve parallel branches when hints and artifacts suggest different interpretations.
- If a tool has been independently validated, stop repeatedly blaming the tool unless new evidence points back to it.
- Promote only artifact-verified findings to conclusions and document abandoned branches briefly.
inputs:
- User task and authorized scope.
- User hints or steering messages.
- Artifact observations and tool outputs.
- Candidate hypotheses, assumptions, failed attempts, and known checkpoints.
outputs:
- hypothesis ledger
- evidence checkpoint table
- verification plan
- pivot criteria
- updated artifact-grounded analysis plan
guardrails:
- Treat user hints as high-value hypotheses, not automatically verified facts.
- Keep user authority over scope and intent distinct from evidence used for technical conclusions.
- Prefer reproducible artifact evidence, hashes, protocol behavior, runtime output, and independent tool checks.
- Do not claim solved status without artifact-backed verification.
- Do not store secret-like recovered material in durable memory.
- Preserve authorization, sandboxing, and external-contact boundaries.
anti_patterns:
- Anchoring on one plausible hint while ignoring narrower artifact wording.
- Re-debugging validated tools because candidate inputs fail.
- Collapsing hint, assumption, and fact into the same category.
- Reporting guessed values without verification.
- Following external references blindly without reproducing the evidence path.
evals:
- id: eval-skill-analysis-hypothesis-evidence-control-routing
  prompt: "An investigation has user hints pointing one way, but artifact evidence and parser checks keep contradicting that branch. Which skill helps manage this?"
  expected_behavior: Routes to analysis.hypothesis_evidence_control and explains that hints become hypotheses while conclusions require artifact verification.
  eval_type: Routing
  safety_notes:
  - Preserve authorized scope and evidence provenance.
- id: eval-skill-analysis-hypothesis-evidence-control-source-grounding
  prompt: "Show the evidence discipline for handling conflicting hints, tool output, and artifact observations."
  expected_behavior: Cites generalized source section skill-analysis-hypothesis-evidence-control, separates evidence categories, and avoids task-specific claims.
  eval_type: SourceGrounding
  safety_notes: []
- id: eval-skill-analysis-hypothesis-evidence-control-tool-planning
  prompt: "Plan how to decide whether a failure is caused by a bad parser, wrong key, bad extraction, or wrong clue interpretation."
  expected_behavior: Builds checkpoints for extraction integrity, stream/object selection, parser roundtrip validation, candidate testing, and pivot criteria.
  eval_type: ToolUsePlanning
  safety_notes:
  - Use read-only checks first and avoid unverified conclusions.
