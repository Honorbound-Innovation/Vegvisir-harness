id: skill-crypto-classical-cipher-chain
title: crypto.classical_cipher_chain
summary: Solve chained classical-cipher and encoding workflows with systematic key
  recovery and verification
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: artifact-analysis
source_section_ids:
- skill-crypto-classical-cipher-chain
procedure:
- Normalize input text while preserving original spacing, punctuation, and casing
  in evidence.
- Classify likely cipher/encoding family from hints, symbol distribution, and plaintext
  fragments.
- Try low-cost decoders first and record parameters, offsets, rails, alphabets, start
  bit, or rotor settings.
- Use challenge-provided correction notes exactly and document any substituted ciphertext/configuration.
- When a decode yields instructions or a key, verify by opening the next artifact
  or checking known plaintext.
- For custom encodings, write a small deterministic decoder and include testable assumptions.
- Keep all recovered passwords and flags out of durable memory unless sanitized.
- Produce a staged cipher report with parameters and verification results.
inputs:
- Ciphertext or encoded text.
- Hints, correction notes, configs, candidate keys, and locked artifacts.
outputs:
- cipher classification
- decoded plaintext candidates
- parameter ledger
- decoder script or pseudocode
- verified next-stage password
- cipher chain report
guardrails:
- Do not submit guessed keys as solved without verification.
- Preserve original ciphertext and correction notes.
- Avoid online exfiltration of sensitive/private ciphertext unless authorized.
anti_patterns:
- Discarding punctuation/case when the cipher preserves it.
- Using a decode result as final when it is actually an intermediate password.
- Forgetting offset/start-state hints such as starting with zero.
