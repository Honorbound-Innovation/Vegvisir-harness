id: skill-forensics-pcap-embedded-artifact-chain
title: forensics.pcap_embedded_artifact_chain
summary: Recover and analyze embedded artifacts from PCAP/PCAPNG captures through
  verified extraction, covert channels, encrypted streams, and payload follow-up
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: artifact-analysis
source_section_ids:
- skill-forensics-pcap-embedded-artifact-chain
procedure:
- Identify capture format, encapsulation, packet count, time range, and protocol mix.
- For USBPcap or non-network captures, extract the correct payload field and verify
  completeness with expected file magic or packet count.
- Carve embedded archives/files and verify nested captures before continuing.
- Profile conversations, streams, DNS/HTTP/IRC/ICMP messages, and unusual ports.
- Extract covert-channel payloads and build a clue/key/hash ledger.
- For encrypted transfers, identify the tool/protocol and validate decryptors with
  roundtrip or header/checksum evidence.
- Verify decrypted payloads with supplied hashes or file types before analyzing them.
- Route decrypted binaries/scripts/configs to the appropriate binary or payload-analysis
  skill.
inputs:
- PCAP/PCAPNG or extracted stream data.
- Hints, expected counts, hashes, keys, protocol notes, and tool source if provided.
outputs:
- capture profile
- embedded artifact inventory
- covert-channel transcript
- encrypted stream extraction report
- decryptor verification notes
- payload follow-up plan
- PCAP evidence chain report
guardrails:
- Do not replay traffic to external systems unless explicitly authorized.
- Prefer offline extraction and analysis.
- Do not execute decrypted payloads without sandbox approval.
- Preserve original captures and record exact extraction filters/fields.
anti_patterns:
- Treating USBPcap as normal IP traffic.
- Failing to verify nested packet counts before later stages.
- Debugging a validated decryptor when the key/clue hypothesis is wrong.
- Ignoring protocol transcripts that explain the next stage.
