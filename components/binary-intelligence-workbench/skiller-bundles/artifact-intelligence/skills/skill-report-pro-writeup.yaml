id: skill-report-pro-writeup
title: report.professional_writeup_generate
summary: Generate professional technical writeups
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: technical-reporting
source_section_ids:
- skill-report-pro-writeup
procedure:
- Confirm user authorization, task scope, and applicable safety boundaries.
- Inspect available artifacts and context before making strong claims.
- Preserve original evidence and write derived artifacts only to scoped case directories.
- Follow the detailed Markdown workflow body with the matching skill title when deeper procedure is needed.
- Produce evidence-backed outputs and explicit verification or blockers.
inputs:
- User task, artifact path, case directory, optional context, optional authorized endpoint, available tools.
outputs:
- report.md
- report.html
- evidence index
- redaction notes
guardrails:
- Use only on authorized CTF, lab, owned, or defensive analysis targets.
- Do not request, store, or expose plaintext credentials, tokens, private keys, or secret-bearing URLs.
- Do not execute unknown binaries or payloads outside explicit sandbox authorization.
- Do not contact external services unless endpoint scope is explicitly authorized.
- Preserve evidence provenance and distinguish fact from inference.
anti_patterns:
- Do not fabricate artifacts, commands, decrypted values, or flags.
- Do not reuse captured credentials or pivot to unauthorized systems.
- Do not treat decompiler output as authoritative when runtime evidence contradicts it.
- Do not store secret-like recovered material in durable memory.
