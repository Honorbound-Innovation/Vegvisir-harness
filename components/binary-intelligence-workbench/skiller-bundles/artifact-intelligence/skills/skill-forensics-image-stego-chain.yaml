id: skill-forensics-image-stego-chain
title: forensics.image_stego_chain
summary: Analyze image artifacts with metadata clues, appended data, stego payloads,
  nested archives, and follow-on ciphers
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: artifact-analysis
source_section_ids:
- skill-forensics-image-stego-chain
procedure:
- Preserve the original image and compute hashes.
- Identify image type, dimensions, metadata, comments, thumbnails, and unusual fields.
- Search for trailing data after normal image terminators and carve embedded file
  signatures.
- Decode obvious clue encodings such as Morse, base64, hex, ROT, or human-readable
  comments.
- Build a candidate passphrase ledger from metadata, carved files, and visible clues.
- Use stego tools only on copied artifacts and only with candidate passphrases tied
  to evidence.
- Inspect extracted archives/files and route nested binaries, PCAPs, ciphers, or scripts
  to specialized skills.
- Summarize provenance from image clue to extracted evidence and final result.
inputs:
- Image file or image set.
- Optional hints and candidate passphrases.
- Available stego/carving/metadata tools.
outputs:
- image metadata report
- trailing-data carve report
- stego candidate ledger
- extracted artifact inventory
- image evidence chain report
guardrails:
- Do not modify originals.
- Do not execute embedded payloads during extraction.
- Respect licensed/private images and authorization scope.
- Treat found passwords/flags as sensitive and avoid durable memory writes.
anti_patterns:
- Jumping to LSB/stego before checking metadata and appended data.
- Trusting a decoy extracted text file as final without chain verification.
- Ignoring challenge correction notes or password casing hints.
