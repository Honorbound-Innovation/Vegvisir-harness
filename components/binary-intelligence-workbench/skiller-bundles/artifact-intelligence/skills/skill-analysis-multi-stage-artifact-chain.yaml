id: skill-analysis-multi-stage-artifact-chain
title: analysis.multi_stage_artifact_chain
summary: Manage verified multi-stage artifact chains across clues, passwords, archives,
  ciphers, payloads, and final reports
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: artifact-analysis
source_section_ids:
- skill-analysis-multi-stage-artifact-chain
procedure:
- Restate the final question and enumerate all provided artifacts, hints, endpoints,
  and constraints.
- Create an evidence ledger with stage, source, operation, output, verification, confidence,
  and dependency fields.
- Inspect outer artifacts safely and preserve originals before extracting nested content.
- For each recovered clue, classify it as verified, candidate, contextual, rejected,
  or unused.
- Verify every transition with file type, hash, archive listing, packet count, parser
  roundtrip, known magic bytes, or runtime output.
- Apply unlocked artifacts to the next layer only after the previous layer is verified.
- Preserve failed branches and pivot criteria so clue interpretation does not overwrite
  evidence.
- Generate a final chain report showing the shortest verified path from original artifact
  to answer.
inputs:
- Unknown or staged artifact set.
- Challenge/investigation notes and hints.
- Recovered files, clues, candidate passwords, hashes, ciphers, and intermediate outputs.
outputs:
- multi-stage evidence ledger
- dependency chain map
- candidate and rejected clue table
- verification checkpoint table
- reproducible extraction/decode plan
- final chain report
guardrails:
- Use copies and read-only inspection before extraction or mutation.
- Do not execute recovered payloads unless explicitly authorized and sandboxed.
- Do not treat clues as facts until verified by artifact behavior.
- Do not store flags, credentials, tokens, or secret-like answers in durable memory/examples.
- Track provenance for every recovered key, password, and file.
anti_patterns:
- Skipping verification because a clue seems obvious.
- Losing intermediate passwords or hashes between stages.
- Overwriting extracted files without backups.
- Combining unrelated red herrings into the verified chain.
