id: skill-binary-dotnet-gui-constraint-recovery
title: binary.dotnet_gui_constraint_recovery
summary: Recover keys from .NET GUI validation logic by extracting constraints and
  success-path transforms without needing the GUI
skill_type: Procedure
scope: TaskLevel
status: Approved
maturity: Level4HumanApproved
domain: artifact-analysis
source_section_ids:
- skill-binary-dotnet-gui-constraint-recovery
procedure:
- Identify whether the binary is .NET/Mono and preserve hashes.
- Extract metadata, strings, resources, forms, event handlers, and embedded arrays
  with available .NET tools or static parsing.
- Locate UI event handlers for buttons, scrollbars, textboxes, or validation actions.
- Recover numeric/string constraints and solve them with algebra, brute force, or
  a small script.
- Trace success-path output generation separately from failure-path decoys.
- Reimplement the success transform in a deterministic script and validate output
  shape/format.
- Document required UI values and recovered key without needing to run the GUI.
inputs:
- .NET/Mono executable or assembly.
- Optional UI screenshot/instructions.
- Available decompiler/metadata/strings tools.
outputs:
- UI control map
- validation constraints
- constraint solver script
- success transform model
- recovered key or license blob
- verification notes
guardrails:
- Do not run unknown GUI binaries outside authorized/sandboxed context.
- Do not patch binaries unless explicitly requested and backed up.
- Keep recovered secret-like values out of durable memory/examples.
anti_patterns:
- Assuming displayed failure text is the key.
- Running the GUI when static constraints are enough.
- Ignoring embedded arrays/resources because symbols are obfuscated.
